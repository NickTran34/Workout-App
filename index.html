<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FitQuest">
<title>FitQuest</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--ac:#88bbff;--ac2:#4466aa;--bg:#07070f;--bg2:#0d0d1e;--border:#ffffff12;--text:#eeeeff;--muted:#5560a0}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
@keyframes aura{0%,100%{transform:scale(1);opacity:.25}50%{transform:scale(1.08);opacity:.6}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes particle{0%{opacity:1;transform:translateY(0) translateX(0)}100%{opacity:0;transform:translateY(-50px) translateX(var(--dx,0px))}}
@keyframes evo-flash{0%{opacity:0;transform:scale(.8)}15%{opacity:1;transform:scale(1.05)}80%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(1.1)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes glitch{0%,88%,100%{transform:translate(0)}89%{transform:translate(-2px,1px)}90%{transform:translate(2px,-1px)}91%{transform:translate(0)}}
.nav{display:flex;justify-content:center;gap:3px;padding:10px 8px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.nb{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:.05em;padding:6px 11px;border-radius:7px;border:1px solid transparent;background:transparent;color:var(--muted);cursor:pointer;transition:all .2s;text-transform:uppercase}
.nb.on{background:var(--ac)18;border-color:var(--ac)60;color:var(--ac)}
.nb:active{transform:scale(.96)}
.page{padding:16px 14px 90px;max-width:640px;margin:0 auto;animation:fadeIn .3s ease}
.sec{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;margin:18px 0 9px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:13px;padding:15px;margin-bottom:11px}
.field{margin-bottom:11px}
.field label{display:block;font-size:11px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;background:#ffffff07;border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:15px;outline:none;transition:border .2s;-webkit-appearance:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--ac)60}
.field select option{background:var(--bg2)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:11px 20px;border-radius:10px;border:none;font-family:'Orbitron',monospace;font-size:11px;letter-spacing:.07em;cursor:pointer;transition:all .2s;text-transform:uppercase;-webkit-tap-highlight-color:transparent}
.btn-p{background:linear-gradient(135deg,var(--ac),var(--ac2));color:#fff;box-shadow:0 0 16px var(--ac)30}
.btn-p:active{transform:scale(.97)}
.btn-p:disabled{opacity:.5;cursor:not-allowed}
.btn-s{background:#ffffff0c;color:var(--text);border:1px solid var(--border)}
.btn-d{background:#ff303010;color:#ff7070;border:1px solid #ff303028}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:12px;text-align:center}
.sv{font-family:'Orbitron',monospace;font-size:19px;font-weight:700;color:var(--ac)}
.sl{font-size:10px;color:var(--muted);letter-spacing:.05em;margin-top:2px;text-transform:uppercase}
.xp-t{height:9px;background:#ffffff0e;border-radius:99px;overflow:hidden;position:relative}
.xp-f{height:100%;border-radius:99px;transition:width .9s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden}
.xp-f::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,#ffffff40,transparent);background-size:200% 100%;animation:shimmer 2s infinite}
.ai-card{background:linear-gradient(135deg,var(--ac)08,var(--ac2)08);border:1px solid var(--ac)30;border-radius:13px;padding:15px;margin-bottom:11px}
.al{font-size:10px;color:var(--ac);letter-spacing:.1em;text-transform:uppercase;margin-bottom:7px;font-family:'Orbitron',monospace}
.mg-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
.mg-card{background:#0a0a1a;border:1px solid var(--border);border-radius:10px;padding:10px;transition:border-color .2s}
.mg-card.active{border-color:var(--ac)50}
.bar-wrap{display:flex;align-items:flex-end;gap:4px;height:80px}
.bc{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.bb{width:100%;border-radius:3px 3px 0 0;min-height:2px;transition:height .6s ease}
.drop-z{border:2px dashed var(--border);border-radius:10px;padding:22px;text-align:center;color:var(--muted);font-size:13px;cursor:pointer;transition:all .2s}
.drop-z.over,.drop-z:hover{border-color:var(--ac)50;color:var(--ac);background:var(--ac)06}
.char-img-wrap{isolation:isolate;display:inline-block;position:relative}
.char-img-wrap img{}
.evo-overlay{position:fixed;inset:0;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;animation:evo-flash 3.2s ease forwards;pointer-events:none}
.act-item{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:11px 13px;display:flex;align-items:center;gap:11px;margin-bottom:7px}
@supports(padding:max(0px)){
  .nav{padding-top:max(10px,env(safe-area-inset-top))}
  .page{padding-bottom:max(90px,calc(env(safe-area-inset-bottom)+80px))}
}
</style>
</head>

function getSI(xp){
  let rem=xp,i=0;
  while(i<STAGES.length-1&&rem>=1000){rem-=1000;i++}
  return{...STAGES[i],stage:i,xpIn:rem,pct:Math.min(rem/1000,1)};
}

function Char({si,size=180,orbs=true}){
  const n=si.stage>=4?si.stage-2:0;
  return h("div",{style:{position:"relative",display:"inline-block",
    animation:`bob ${2.2-si.stage*.1}s ease-in-out infinite`,
    filter:`drop-shadow(0 0 ${10+si.stage*6}px ${si.c}99) drop-shadow(0 0 ${4+si.stage*3}px ${si.c}66)`}},
    h("div",{style:{position:"absolute",top:"50%",left:"50%",
      transform:"translate(-50%,-55%)",
      width:"140%",height:"140%",
      background:`radial-gradient(ellipse at center, ${si.c}22 0%, ${si.c}08 50%, transparent 75%)`,
      borderRadius:"50%",
      animation:`aura 2s ease-in-out infinite`,
      pointerEvents:"none",zIndex:0}}),
    h("img",{src:si.img,style:{width:size,height:size,objectFit:"contain",
      imageRendering:"pixelated",display:"block",position:"relative",zIndex:1,mixBlendMode:"multiply"},
      onError:e=>{e.target.style.opacity=0}}),
    orbs&&[...Array(n)].map((_,i)=>{
      const r=size*.44+i*17,dur=2.4-i*.22,sz=5+i;
      return h("div",{key:"o"+i,style:{position:"absolute",top:"50%",left:"50%",width:0,height:0,animation:`spin ${dur}s linear infinite`}},
        h("div",{style:{position:"absolute",width:sz,height:sz,background:si.c,borderRadius:2,
          transform:`translate(${r}px,-${sz/2}px)`,boxShadow:`0 0 ${sz*3}px ${si.c}`,
          animation:`pulse ${1+i*.4}s ease-in-out infinite`}}))
    }),
    h("div",{style:{position:"absolute",bottom:-10,left:"50%",transform:"translateX(-50%)",
      width:size*.5+si.stage*9,height:8,
      background:`radial-gradient(${si.c}44,transparent)`,borderRadius:"50%",
      animation:`pulse ${2.2-si.stage*.1}s ease-in-out infinite`,zIndex:2}})
  );
}

function useData(){
  const K="fitquest_v3";
  const[d,sd]=useState(()=>{try{const r=localStorage.getItem(K);return r?JSON.parse(r):{workouts:[],totalXP:0}}catch{return{workouts:[],totalXP:0}}});
  useEffect(()=>{try{localStorage.setItem(K,JSON.stringify(d))}catch{}},[d]);
  return[d,sd];
}

function App(){
  const[data,setData]=useData();
  const[tab,setTab]=useState("home");
  const[evo,setEvo]=useState(null);
  const[coach,setCoach]=useState({trend:"",motive:""});
  const[coaching,setCoaching]=useState(false);
  const si=getSI(data.totalXP);

  useEffect(()=>{
    document.documentElement.style.setProperty("--ac",si.c);
    document.documentElement.style.setProperty("--ac2",si.c+"bb");
  },[si.c]);

  function addW(w){
    setData(d=>{
      const oi=getSI(d.totalXP).stage;
      const nx=d.totalXP+w.xp;
      const ni=getSI(nx).stage;
      if(ni>oi){setEvo(STAGES[ni]);setTimeout(()=>setEvo(null),3200)}
      return{...d,workouts:[w,...d.workouts],totalXP:nx};
    });
  }

  useEffect(()=>{
    const h=ev=>{const e=ev.detail;setData(d=>({...d,workouts:[...e,...d.workouts],totalXP:d.totalXP+e.reduce((s,w)=>s+w.xp,0)}))};
    window.addEventListener("batch-import",h);return()=>window.removeEventListener("batch-import",h);
  },[]);

  async function getCoach(){
    if(!data.workouts.length){alert("Log some workouts first!");return}
    setCoaching(true);setCoach({trend:"",motive:""});
    const p=`FitQuest AI Coach. User: ${data.workouts.length} workouts, ${data.totalXP} XP, stage "${si.name}". Recent: ${JSON.stringify(data.workouts.slice(0,20).map(w=>({type:w.type,xp:w.xp,date:w.date,dist:w.distance||null,muscles:w.muscleGroups?Object.keys(w.muscleGroups):null})))}. ONLY respond with JSON no markdown: {"trend":"2-3 sentence analysis with numbers","motive":"1-2 sentence gamified message mentioning '${si.name}'"}`;
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:350,messages:[{role:"user",content:p}]})});
      const d=await r.json();
      const t=d.content?.[0]?.text||"{}";
      setCoach(JSON.parse(t.replace(/```json|```/g,"").trim()));
    }catch{setCoach({trend:"Could not connect to AI coach right now.",motive:"Keep pushing — your power grows every session!"})}
    setCoaching(false);
  }

  function exportD(){
    const b=new Blob([JSON.stringify({...data,exportedAt:new Date().toISOString(),v:"3.0"},null,2)],{type:"application/json"});
    const a=document.createElement("a");a.href=URL.createObjectURL(b);
    a.download=`fitquest-backup-${new Date().toISOString().slice(0,10)}.json`;a.click();
  }

  function importD(file){
    const r=new FileReader();
    r.onload=ev=>{try{const p=JSON.parse(ev.target.result);if(p.workouts&&typeof p.totalXP==="number"){setData({workouts:p.workouts,totalXP:p.totalXP});alert(`✅ Imported ${p.workouts.length} workouts — ${p.totalXP.toLocaleString()} XP restored`)}else alert("❌ Invalid FitQuest backup file")}catch{alert("❌ Could not parse file")}};
    r.readAsText(file);
  }

  function importXML(file){
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const xml=new DOMParser().parseFromString(ev.target.result,"text/xml");
        const byDate={};
        Array.from(xml.querySelectorAll("Record")).filter(r=>r.getAttribute("type")==="HKQuantityTypeIdentifierDistanceWalkingRunning").forEach(rec=>{
          const day=(rec.getAttribute("startDate")||"").slice(0,10);
          const val=parseFloat(rec.getAttribute("value")||0);
          const unit=rec.getAttribute("unit")||"";
          const miles=unit.includes("km")?val*0.621371:val;
          if(!byDate[day])byDate[day]={distance:0,duration:0};
          byDate[day].distance+=miles;
        });
        Array.from(xml.querySelectorAll("Workout")).filter(w=>(w.getAttribute("workoutActivityType")||"").includes("Running")).forEach(w=>{
          const day=(w.getAttribute("startDate")||"").slice(0,10);
          const dur=parseFloat(w.getAttribute("duration")||0);
          if(byDate[day])byDate[day].duration+=dur;
        });
        const entries=Object.entries(byDate).filter(([,v])=>v.distance>.1).map(([date,v])=>({type:"run",xp:Math.round(v.distance*30),date:new Date(date).toLocaleDateString(),distance:Math.round(v.distance*100)/100,duration:Math.round(v.duration)||null,note:"Apple Health",ts:new Date(date).getTime()+Math.random()*999})).sort((a,b)=>b.ts-a.ts);
        if(!entries.length){alert("No running data found. Make sure this is from the Apple Health app export.");return}
        window.dispatchEvent(new CustomEvent("batch-import",{detail:entries}));
        alert(`✅ Imported ${entries.length} runs!\n${entries.reduce((s,e)=>s+e.distance,0).toFixed(1)} total miles`);
      }catch(err){alert("❌ Error parsing file: "+err.message)}
    };
    r.readAsText(file);
  }

  const tabs=[{id:"home",l:"Home"},{id:"log",l:"Log"},{id:"progress",l:"Stats"},{id:"coach",l:"Coach"},{id:"data",l:"Data"}];

  return h("div",null,
    evo&&h("div",{className:"evo-overlay",style:{background:evo.c+"ee"}},
      h("div",{style:{fontFamily:"Orbitron,monospace",fontSize:26,fontWeight:900,color:"#fff",textAlign:"center",marginBottom:14,letterSpacing:".04em"}},"⚡ EVOLUTION ⚡"),
      h("img",{src:evo.img,style:{width:170,height:170,objectFit:"contain",imageRendering:"pixelated",filter:"drop-shadow(0 0 24px #fff)"}}),
      h("div",{style:{fontFamily:"Orbitron,monospace",fontSize:20,color:"#fff",marginTop:14,textAlign:"center"}},evo.name),
      h("div",{style:{color:"#ffffffaa",fontSize:14,marginTop:6}},"New form unlocked!")
    ),
    h("nav",{className:"nav"},tabs.map(t=>h("button",{key:t.id,className:"nb"+(tab===t.id?" on":""),onClick:()=>setTab(t.id)},t.l))),
    tab==="home"&&h(Home,{si,data}),
    tab==="log"&&h(Log,{onAdd:addW,onXML:importXML}),
    tab==="progress"&&h(Progress,{data,si}),
    tab==="coach"&&h(Coach,{coach,coaching,onFetch:getCoach,si}),
    tab==="data"&&h(Data,{data,onExport:exportD,onImport:importD,onReset:()=>{if(confirm("Reset ALL data? Cannot be undone."))setData({workouts:[],totalXP:0})}})
  );
}

function Log({onAdd,onXML}){
  const[type,setType]=useState("run");
  const[dist,setDist]=useState("");
  const[dur,setDur]=useState("");
  const[note,setNote]=useState("");
  const[cxp,setCxp]=useState("");
  const[muscles,setMuscles]=useState({});
  const[addFor,setAddFor]=useState(null);
  const[exIn,setExIn]=useState("");
  const xmlRef=useRef();
  const wt=WTYPES.find(t=>t.id===type);

  function calcXP(){
    if(type==="custom")return parseInt(cxp)||50;
    if(type==="strength"){const t=Object.values(muscles).reduce((s,a)=>s+a.length,0);return Math.max(t*15,60)}
    if(type==="run"||type==="cycling")return Math.round((parseFloat(dist)||1)*wt.xp);
    return wt.xp;
  }

  function addEx(mid){
    if(!exIn.trim())return;
    setMuscles(m=>({...m,[mid]:[...(m[mid]||[]),{ex:exIn.trim(),ts:Date.now()}]}));
    setExIn("");setAddFor(null);
  }

  function submit(){
    const xp=calcXP();
    onAdd({type,xp,date:new Date().toLocaleDateString(),distance:parseFloat(dist)||null,duration:parseInt(dur)||null,note,muscleGroups:type==="strength"&&Object.keys(muscles).length?muscles:undefined,ts:Date.now()});
    setDist("");setDur("");setNote("");setCxp("");setMuscles({});
    alert("✅ +"+xp+" XP earned! Keep grinding!");
  }

  return h("div",{className:"page"},
    h("div",{className:"sec"},"Log Workout"),
    h("div",{className:"card"},
      h("div",{className:"field"},
        h("label",null,"Workout Type"),
        h("select",{value:type,onChange:e=>setType(e.target.value)},WTYPES.map(t=>h("option",{key:t.id,value:t.id},t.icon+" "+t.label)))
      ),
      (type==="run"||type==="cycling")&&h("div",{className:"field"},h("label",null,"Distance (miles)"),h("input",{type:"number",step:.1,min:0,placeholder:"e.g. 3.1",value:dist,onChange:e=>setDist(e.target.value)})),
      type!=="strength"&&h("div",{className:"field"},h("label",null,"Duration (min)"),h("input",{type:"number",min:0,placeholder:"e.g. 30",value:dur,onChange:e=>setDur(e.target.value)})),
      type==="custom"&&h("div",{className:"field"},h("label",null,"Custom XP"),h("input",{type:"number",min:1,placeholder:"50",value:cxp,onChange:e=>setCxp(e.target.value)})),
      type!=="strength"&&h("div",{className:"field"},h("label",null,"Notes"),h("input",{type:"text",placeholder:"How did it feel?",value:note,onChange:e=>setNote(e.target.value)})),
      type!=="strength"&&h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:6}},
        h("div",{style:{fontFamily:"Orbitron,monospace",fontSize:14,color:"var(--ac)"}},"+"+(calcXP())+" XP"),
        h("button",{className:"btn btn-p",onClick:submit},"Log ⚡")
      )
    ),
    type==="strength"&&h("div",null,
      h("div",{className:"sec"},"Muscle Groups"),
      h("div",{style:{fontSize:13,color:"var(--muted)",marginBottom:12}},"Add exercises per muscle. 15 XP each, 60 XP minimum."),
      h("div",{className:"mg-grid"},
        MUSCLES.map(mg=>{
          const exs=muscles[mg.id]||[];
          return h("div",{key:mg.id,className:"mg-card"+(exs.length?" active":"")},
            h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}},
              h("div",{style:{fontSize:13,fontWeight:600,color:exs.length?"var(--ac)":"var(--text)"}},mg.icon+" "+mg.label),
              exs.length&&h("div",{style:{fontFamily:"Orbitron,monospace",fontSize:10,color:"var(--ac)"}},exs.length+"x")
            ),
            exs.map((ex,i)=>h("div",{key:i,style:{background:"#ffffff06",borderRadius:6,padding:"4px 8px",marginBottom:4,fontSize:12,color:"#a0a0c0",display:"flex",justifyContent:"space-between",alignItems:"center"}},
              h("span",{style:{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginRight:4}},ex.ex),
              h("span",{onClick:()=>setMuscles(m=>({...m,[mg.id]:m[mg.id].filter((_,j)=>j!==i)})),style:{cursor:"pointer",color:"#ff5060",fontSize:12,flexShrink:0}},"✕")
            )),
            addFor===mg.id
              ?h("div",{style:{marginTop:4}},
                h("input",{autoFocus:true,style:{width:"100%",background:"#ffffff08",border:"1px solid var(--ac)50",borderRadius:6,padding:"7px 9px",color:"var(--text)",fontSize:13,fontFamily:"Rajdhani,sans-serif",outline:"none"},
                  placeholder:"e.g. Bench press 3×10",value:exIn,onChange:e=>setExIn(e.target.value),
                  onKeyDown:e=>{if(e.key==="Enter")addEx(mg.id);if(e.key==="Escape"){setAddFor(null);setExIn("")}}}),
                h("div",{style:{display:"flex",gap:5,marginTop:5}},
                  h("button",{className:"btn btn-p",style:{padding:"5px 12px",fontSize:10},onClick:()=>addEx(mg.id)},"Add"),
                  h("button",{className:"btn btn-s",style:{padding:"5px 12px",fontSize:10},onClick:()=>{setAddFor(null);setExIn("")}},"Cancel")
                )
              )
              :h("button",{style:{width:"100%",background:"transparent",border:"1px dashed #ffffff18",borderRadius:6,padding:6,color:"var(--muted)",fontSize:10,cursor:"pointer",fontFamily:"Orbitron,monospace",textTransform:"uppercase",marginTop:exs.length?4:0},onClick:()=>{setAddFor(mg.id);setExIn("")}},"+ Add exercise")
          )
        })
      ),
      h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 0"}},
        h("div",{style:{fontFamily:"Orbitron,monospace",fontSize:14,color:"var(--ac)"}},"+"+(calcXP())+" XP"),
        h("button",{className:"btn btn-p",onClick:submit},"Log Strength ⚡")
      ),
      h("div",{className:"field"},h("label",null,"Session Notes"),h("input",{type:"text",placeholder:"Overall feel, PRs, notes...",value:note,onChange:e=>setNote(e.target.value)}))
    ),
    h("div",{className:"sec"},"Apple Health Import"),
    h("div",{className:"card"},
      h("div",{style:{fontSize:13,color:"var(--muted)",marginBottom:12,lineHeight:1.7}},"Import directly from your Apple Health export.xml — all your runs load automatically."),
      h("button",{className:"btn btn-p",style:{width:"100%",marginBottom:10},onClick:()=>xmlRef.current.click()},"📱 Upload Apple Health export.xml"),
      h("input",{type:"file",accept:".xml",ref:xmlRef,style:{display:"none"},onChange:e=>{const f=e.target.files[0];if(f)onXML(f);e.target.value=""}}),
      h("div",{style:{fontSize:11,color:"var(--muted)",lineHeight:1.7}},"Health app → Profile → Export All Health Data → share the export.xml file here")
    )
  );
}

function Progress({data,si}){
  const weeks={};
  data.workouts.forEach(w=>{const k=Math.floor((w.ts||Date.now())/(7*24*3600*1000));if(!weeks[k])weeks[k]={xp:0,n:0};weeks[k].xp+=w.xp;weeks[k].n++});
  const wa=Object.values(weeks).slice(-8);
  const mx=Math.max(...wa.map(w=>w.xp),1);
  const miles=data.workouts.filter(w=>w.type==="run"&&w.distance).reduce((s,w)=>s+(w.distance||0),0);
  const tm={};data.workouts.forEach(w=>tm[w.type]=(tm[w.type]||0)+1);
  const mm={};data.workouts.filter(w=>w.muscleGroups).forEach(w=>Object.entries(w.muscleGroups).forEach(([k,v])=>{mm[k]=(mm[k]||0)+v.length}));

  return h("div",{className:"page"},
    h("div",{className:"sec"},"Overview"),
    h("div",{style:{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:9,marginBottom:14}},
      h("div",{className:"stat"},h("div",{className:"sv"},data.totalXP.toLocaleString()),h("div",{className:"sl"},"Total XP")),
      h("div",{className:"stat"},h("div",{className:"sv"},miles.toFixed(1)),h("div",{className:"sl"},"Miles")),
      h("div",{className:"stat"},h("div",{className:"sv"},data.workouts.length),h("div",{className:"sl"},"Sessions")),
      h("div",{className:"stat"},h("div",{className:"sv"},(si.stage+1)+"/7"),h("div",{className:"sl"},"Stage"))
    ),
    wa.length>0&&h("div",{className:"card"},
      h("div",{style:{fontSize:10,color:"var(--muted)",letterSpacing:".08em",textTransform:"uppercase",marginBottom:10,fontFamily:"Orbitron,monospace"}},"Weekly XP"),
      h("div",{className:"bar-wrap"},
        wa.map((w,i)=>h("div",{key:i,className:"bc"},
          h("div",{style:{fontSize:9,color:"var(--ac)",fontFamily:"Orbitron,monospace"}},w.xp||""),
          h("div",{className:"bb",style:{height:(w.xp/mx*68)+"px",background:`linear-gradient(180deg,${si.c},${si.c}88)`}}),
          h("div",{style:{fontSize:9,color:"var(--muted)",fontFamily:"Orbitron,monospace"}},w.n+"x")
        ))
      )
    ),
    Object.keys(mm).length>0&&h("div",{className:"card"},
      h("div",{style:{fontSize:10,color:"var(--muted)",letterSpacing:".08em",textTransform:"uppercase",marginBottom:10,fontFamily:"Orbitron,monospace"}},"Muscle Volume"),
      Object.entries(mm).sort((a,b)=>b[1]-a[1]).map(([k,v])=>{
        const mg=MUSCLES.find(m=>m.id===k)||{label:k,icon:"💪"};
        const pct=Math.round(v/Math.max(...Object.values(mm))*100);
        return h("div",{key:k,style:{marginBottom:9}},
          h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:3}},
            h("span",null,mg.icon+" "+mg.label),
            h("span",{style:{color:"var(--ac)",fontFamily:"Orbitron,monospace",fontSize:10}},v+" sets")
          ),
          h("div",{className:"xp-t",style:{height:5}},h("div",{className:"xp-f",style:{width:pct+"%",background:`linear-gradient(90deg,${si.c}88,${si.c})`}}))
        )
      })
    ),
    Object.keys(tm).length>0&&h("div",{className:"card"},
      h("div",{style:{fontSize:10,color:"var(--muted)",letterSpacing:".08em",textTransform:"uppercase",marginBottom:10,fontFamily:"Orbitron,monospace"}},"Workout Breakdown"),
      Object.entries(tm).map(([k,v])=>{
        const wt=WTYPES.find(t=>t.id===k)||{label:k,icon:"⚡"};
        const pct=Math.round(v/data.workouts.length*100);
        return h("div",{key:k,style:{marginBottom:9}},
          h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:3}},
            h("span",null,wt.icon+" "+wt.label),
            h("span",{style:{color:"var(--ac)",fontFamily:"Orbitron,monospace",fontSize:10}},v+" ("+pct+"%)")
          ),
          h("div",{className:"xp-t",style:{height:5}},h("div",{className:"xp-f",style:{width:pct+"%",background:`linear-gradient(90deg,${si.c}88,${si.c})`}}))
        )
      })
    ),
    !data.workouts.length&&h("div",{style:{textAlign:"center",padding:"40px 0",color:"var(--muted)",fontSize:14}},"No workouts yet. Start your journey!")
  );
}

function Coach({coach,coaching,onFetch,si}){
  return h("div",{className:"page"},
    h("div",{style:{textAlign:"center",padding:"14px 0 22px"}},
      h(Char,{si,size:140,orbs:false}),

    (coach.motive||coaching)&&h("div",{className:"ai-card"},h("div",{className:"al"},"⚡ Warrior Message"),h("div",{style:{fontSize:14,lineHeight:1.7,minHeight:32,color:"var(--text)"}},coaching?"Channeling warrior energy…":coach.motive)),
    !coach.trend&&!coaching&&h("div",{style:{textAlign:"center",padding:"28px 0",color:"var(--muted)",fontSize:14}},"Tap Get AI Analysis for personalized coaching.")

}

  const[drag,setDrag]=useState(false);
  const ref=useRef();
  const si=getSI(data.totalXP);
  const kb=(JSON.stringify(data).length/1024).toFixed(1);
  return h("div",{className:"page"},
    h("div",{className:"sec"},"Save & Backup"),
    h("div",{className:"card"},
      h("div",{style:{display:"flex",flexWrap:"wrap",gap:8,marginBottom:14}},
        h("span",{style:{background:"#70ff9014",color:"#70ff90",border:"1px solid #70ff9030",padding:"2px 9px",borderRadius:99,fontSize:11}},data.workouts.length+" workouts"),
        h("span",{style:{background:"var(--ac)14",color:"var(--ac)",border:"1px solid var(--ac)30",padding:"2px 9px",borderRadius:99,fontSize:11}},data.totalXP.toLocaleString()+" XP"),
        h("span",{style:{background:"#ffaa3014",color:"#ffaa30",border:"1px solid #ffaa3030",padding:"2px 9px",borderRadius:99,fontSize:11}},kb+" KB"),
        h("span",{style:{background:"#c060ff14",color:"#c060ff",border:"1px solid #c060ff30",padding:"2px 9px",borderRadius:99,fontSize:11}},"Stage "+(si.stage+1))
      ),
      h("div",{style:{display:"flex",gap:9,flexWrap:"wrap"}},
        h("button",{className:"btn btn-p",onClick:onExport},"💾 Export Backup"),
        h("button",{className:"btn btn-d",onClick:onReset},"🗑 Reset All")
      )
    ),
    h("div",{className:"sec"},"Import Backup"),
    h("div",{className:"card"},
      h("div",{className:"drop-z"+(drag?" over":""),onClick:()=>ref.current.click(),
        onDragOver:e=>{e.preventDefault();setDrag(true)},onDragLeave:()=>setDrag(false),
        onDrop:e=>{e.preventDefault();setDrag(false);const f=e.dataTransfer.files[0];if(f)onImport(f)}},
        "📂 Drop fitquest-backup.json here or tap to browse"
      ),
      h("input",{type:"file",accept:".json",ref,style:{display:"none"},onChange:e=>{const f=e.target.files[0];if(f)onImport(f);e.target.value=""}}),
      h("div",{style:{fontSize:11,color:"var(--muted)",lineHeight:1.7,marginTop:9}},"⚠️ Import overwrites current save. Export a backup first.")
    ),
    h("div",{className:"sec"},"XP Guide"),
    h("div",{className:"card"},
      h("div",{style:{fontSize:12,color:"var(--muted)",lineHeight:2.1}},
        "🏃 Run = 30 XP/mile  ·  💪 Strength = 15 XP/exercise",h("br"),
        "🧘 Yoga = 60 XP  ·  🚴 Cycling = 25 XP/mile  ·  🏊 Swim = 80 XP",h("br"),
        "🌟 Evolution every 1,000 XP  ·  7 stages  ·  Data auto-saves"
      )
    )
  );
}
