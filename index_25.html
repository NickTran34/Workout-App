<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FitQuest">
<title>FitQuest</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--ac:#88bbff;--ac2:#4466aa;--bg:#07070f;--bg2:#0d0d1e;--border:#ffffff12;--text:#eeeeff;--muted:#5560a0}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
@keyframes aura{0%,100%{transform:scale(1);opacity:.25}50%{transform:scale(1.08);opacity:.6}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes particle{0%{opacity:1;transform:translateY(0) translateX(0)}100%{opacity:0;transform:translateY(-50px) translateX(var(--dx,0px))}}
@keyframes evo-flash{0%{opacity:0;transform:scale(.8)}15%{opacity:1;transform:scale(1.05)}80%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(1.1)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes glitch{0%,88%,100%{transform:translate(0)}89%{transform:translate(-2px,1px)}90%{transform:translate(2px,-1px)}91%{transform:translate(0)}}
.nav{display:flex;justify-content:center;gap:3px;padding:10px 8px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.nb{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:.05em;padding:6px 11px;border-radius:7px;border:1px solid transparent;background:transparent;color:var(--muted);cursor:pointer;transition:all .2s;text-transform:uppercase}
.nb.on{background:var(--ac)18;border-color:var(--ac)60;color:var(--ac)}
.nb:active{transform:scale(.96)}
.page{padding:16px 14px 90px;max-width:640px;margin:0 auto;animation:fadeIn .3s ease}
.sec{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;margin:18px 0 9px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:13px;padding:15px;margin-bottom:11px}
.field{margin-bottom:11px}
.field label{display:block;font-size:11px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;background:#ffffff07;border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:15px;outline:none;transition:border .2s;-webkit-appearance:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--ac)60}
.field select option{background:var(--bg2)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:11px 20px;border-radius:10px;border:none;font-family:'Orbitron',monospace;font-size:11px;letter-spacing:.07em;cursor:pointer;transition:all .2s;text-transform:uppercase;-webkit-tap-highlight-color:transparent}
.btn-p{background:linear-gradient(135deg,var(--ac),var(--ac2));color:#fff;box-shadow:0 0 16px var(--ac)30}
.btn-p:active{transform:scale(.97)}
.btn-p:disabled{opacity:.5;cursor:not-allowed}
.btn-s{background:#ffffff0c;color:var(--text);border:1px solid var(--border)}
.btn-d{background:#ff303010;color:#ff7070;border:1px solid #ff303028}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:12px;text-align:center}
.sv{font-family:'Orbitron',monospace;font-size:19px;font-weight:700;color:var(--ac)}
.sl{font-size:10px;color:var(--muted);letter-spacing:.05em;margin-top:2px;text-transform:uppercase}
.xp-t{height:9px;background:#ffffff0e;border-radius:99px;overflow:hidden;position:relative}
.xp-f{height:100%;border-radius:99px;transition:width .9s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden}
.xp-f::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,#ffffff40,transparent);background-size:200% 100%;animation:shimmer 2s infinite}
.ai-card{background:linear-gradient(135deg,var(--ac)08,var(--ac2)08);border:1px solid var(--ac)30;border-radius:13px;padding:15px;margin-bottom:11px}
.al{font-size:10px;color:var(--ac);letter-spacing:.1em;text-transform:uppercase;margin-bottom:7px;font-family:'Orbitron',monospace}
.mg-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
.mg-card{background:#0a0a1a;border:1px solid var(--border);border-radius:10px;padding:10px;transition:border-color .2s}
.mg-card.active{border-color:var(--ac)50}
.bar-wrap{display:flex;align-items:flex-end;gap:4px;height:80px}
.bc{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.bb{width:100%;border-radius:3px 3px 0 0;min-height:2px;transition:height .6s ease}
.drop-z{border:2px dashed var(--border);border-radius:10px;padding:22px;text-align:center;color:var(--muted);font-size:13px;cursor:pointer;transition:all .2s}
.drop-z.over,.drop-z:hover{border-color:var(--ac)50;color:var(--ac);background:var(--ac)06}
.char-img-wrap{isolation:isolate;display:inline-block;position:relative}
.char-img-wrap img{}
.evo-overlay{position:fixed;inset:0;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;animation:evo-flash 3.2s ease forwards;pointer-events:none}
.act-item{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:11px 13px;display:flex;align-items:center;gap:11px;margin-bottom:7px}
@supports(padding:max(0px)){
  .nav{padding-top:max(10px,env(safe-area-inset-top))}
  .page{padding-bottom:max(90px,calc(env(safe-area-inset-bottom)+80px))}
}
</style>
</head>

const XP_THRESHOLDS=[0,5000,10000,20000,40000,75000,150000];
const XP_LABELS=["5,000","10,000","20,000","40,000","75,000","150,000"];

function getSI(totalXP){
  // Find which stage we are in
  let stage=0;
  for(let i=STAGES.length-1;i>=0;i--){
    const needed=XP_THRESHOLDS.slice(0,i+1).reduce((s,v)=>s+v,0);
    if(totalXP>=needed){stage=i;break;}
  }
  // XP accumulated into current stage
  const xpAtStageStart=XP_THRESHOLDS.slice(0,stage+1).reduce((s,v)=>s+v,0);
  const xpNeededForNext=stage<STAGES.length-1?XP_THRESHOLDS[stage+1]:150000;
  const xpIn=totalXP-xpAtStageStart;
  const pct=stage<STAGES.length-1?Math.min(xpIn/xpNeededForNext,1):1;
  return{...STAGES[stage],stage,xpIn,xpNeeded:xpNeededForNext,xpLabel:XP_LABELS[Math.min(stage,XP_LABELS.length-1)],pct};
}

function Char({si,size=180,orbs=true}){
  const n=si.stage>=4?si.stage-2:0;
  return h("div",{style:{position:"relative",display:"inline-block",
    animation:`bob ${2.2-si.stage*.1}s ease-in-out infinite`,
    filter:`drop-shadow(0 0 ${10+si.stage*6}px ${si.c}99) drop-shadow(0 0 ${4+si.stage*3}px ${si.c}66)`}},
    h("div",{style:{position:"absolute",top:"50%",left:"50%",
      transform:"translate(-50%,-55%)",
      width:"140%",height:"140%",
      background:`radial-gradient(ellipse at center, ${si.c}22 0%, ${si.c}08 50%, transparent 75%)`,
      borderRadius:"50%",
      animation:`aura 2s ease-in-out infinite`,
      pointerEvents:"none",zIndex:0}}),
    h("img",{src:si.img,style:{width:size,height:size,objectFit:"contain",
      imageRendering:"pixelated",display:"block",position:"relative",zIndex:1,mixBlendMode:"multiply"},
      onError:e=>{e.target.style.opacity=0}}),
    orbs&&[...Array(n)].map((_,i)=>{
      const r=size*.44+i*17,dur=2.4-i*.22,sz=5+i;
      return h("div",{key:"o"+i,style:{position:"absolute",top:"50%",left:"50%",width:0,height:0,animation:`spin ${dur}s linear infinite`}},
        h("div",{style:{position:"absolute",width:sz,height:sz,background:si.c,borderRadius:2,
          transform:`translate(${r}px,-${sz/2}px)`,boxShadow:`0 0 ${sz*3}px ${si.c}`,
          animation:`pulse ${1+i*.4}s ease-in-out infinite`}}))
    }),
    h("div",{style:{position:"absolute",bottom:-10,left:"50%",transform:"translateX(-50%)",
      width:size*.5+si.stage*9,height:8,
      background:`radial-gradient(${si.c}44,transparent)`,borderRadius:"50%",
      animation:`pulse ${2.2-si.stage*.1}s ease-in-out infinite`,zIndex:2}})
  );

function useData(){
  const K="fitquest_v3";
  const[d,sd]=useState(()=>{
    try{
      const r=localStorage.getItem(K);
      if(r){
        const parsed=JSON.parse(r);
        // If already has data, use it
        if(parsed.workouts&&parsed.workouts.length>0) return parsed;
      }
      // First time — seed with Apple Health runs
      const totalXP=HEALTH_RUNS.reduce((s,w)=>s+w.xp,0);
      return{workouts:HEALTH_RUNS,totalXP};
    }catch{
      return{workouts:[],totalXP:0};
    }
  });
  useEffect(()=>{try{localStorage.setItem(K,JSON.stringify(d))}catch{}},[d]);
  return[d,sd];
}


/* ── UPGRADE: Streaks, PRs, Achievements, Heatmap ── */
function parsePaceNum(p){
  if(!p)return null;
  const parts=String(p).split(":");
  if(parts.length!==2)return null;
  const v=parseInt(parts[0])+(parseInt(parts[1]||0)/60);
  return isNaN(v)?null:v;
}

function calcStreaks(workouts){
  // Only count workouts from June 1 2026 onwards (fresh start)
  const cutoff=new Date("2026-06-01").getTime();
  const fresh=workouts.filter(w=>(w.ts||0)>=cutoff);
  if(!fresh.length)return{current:0,longest:0,thisWeek:0};
  const WEEK=7*24*3600*1000;
  const weekOf=ts=>Math.floor(ts/WEEK);
  const weeks=new Set(fresh.map(w=>weekOf(w.ts||0)));
  const nowWk=weekOf(Date.now());
  // current streak — only count if this week or last week had activity
  let current=0,wk=nowWk;
  if(!weeks.has(wk))wk--; // grace: if no workout yet this week, check last week
  while(weeks.has(wk)){current++;wk--;}
  // longest streak since June 2026
  const sorted=[...weeks].sort((a,b)=>a-b);
  let longest=0,run=0,prev=null;
  sorted.forEach(w=>{
    run=(prev!==null&&w===prev+1)?run+1:1;
    if(run>longest)longest=run;
    prev=w;
  });
  const thisWeek=fresh.filter(w=>weekOf(w.ts||0)===nowWk).length;
  return{current,longest,thisWeek};
}

function calcPRs(workouts){
  const runs=workouts.filter(w=>w.type==="run"&&w.distance);
  if(!runs.length)return null;
  // Fastest pace (min 1 mile, valid range)
  let fastest=null;
  runs.forEach(r=>{
    const p=parsePaceNum(r.avgPace);
    if(p&&p>=6&&p<=20&&r.distance>=1){
      if(!fastest||p<parsePaceNum(fastest.avgPace))fastest=r;
    }
  });
  // Longest run
  const longest=runs.reduce((a,b)=>(b.distance>(a?a.distance:0)?b:a),null);
  // Biggest XP week
  const WEEK=7*24*3600*1000;
  const wkXP={},wkMi={};
  workouts.forEach(w=>{
    const k=Math.floor((w.ts||0)/WEEK);
    wkXP[k]=(wkXP[k]||0)+w.xp;
  });
  runs.forEach(r=>{
    const k=Math.floor((r.ts||0)/WEEK);
    wkMi[k]=(wkMi[k]||0)+r.distance;
  });
  const bestXPWeek=Math.max(...Object.values(wkXP),0);
  const bestMiWeek=Math.max(...Object.values(wkMi),0);
  return{fastest,longest,bestXPWeek,bestMiWeek};
}

function Heatmap({workouts,si}){
  // GitHub-style: last 17 weeks (~119 days), columns = weeks, rows = days
  const DAY=24*3600*1000;
  const today=new Date();today.setHours(0,0,0,0);
  const todayTS=today.getTime();
  const dayXP={};
  workouts.forEach(w=>{
    if(!w.ts)return;
    const d=new Date(w.ts);d.setHours(0,0,0,0);
    dayXP[d.getTime()]=(dayXP[d.getTime()]||0)+w.xp+(w.xp===0?1:0); // history runs count as activity
  });
  const weeks=17;
  // align so the last column ends today
  const startOffset=(weeks*7-1)+today.getDay()-6;
  const cells=[];
  for(let c=0;c<weeks;c++){
    const col=[];
    for(let r=0;r<7;r++){
      const ts=todayTS-( (weeks-1-c)*7 + (today.getDay()-r) )*DAY;
      if(ts>todayTS){col.push(null);continue;}
      const xp=dayXP[ts]||0;
      col.push({ts,xp});
    }
    cells.push(col);
  }
  const maxXP=Math.max(...Object.values(dayXP),1);
  return h("div",{style:{display:"flex",gap:3,justifyContent:"center"}},
    cells.map((col,ci)=>h("div",{key:ci,style:{display:"flex",flexDirection:"column",gap:3}},
      col.map((cell,ri)=>{
        if(!cell)return h("div",{key:ri,style:{width:11,height:11}});
        const pct=cell.xp/maxXP;
        const bg=cell.xp===0?"#ffffff0a":
          pct<.25?si.c+"33":pct<.5?si.c+"66":pct<.75?si.c+"aa":si.c;
        return h("div",{key:ri,title:new Date(cell.ts).toLocaleDateString()+" — "+cell.xp+" XP",
          style:{width:11,height:11,borderRadius:2,background:bg}});
      })
    ))
  );
}

  useEffect(()=>{
    document.documentElement.style.setProperty("--ac",si.c);
    document.documentElement.style.setProperty("--ac2",si.c+"bb");
  },[si.c]);
  
  // Sync shoes to window so Log form can access them
  useEffect(()=>{window.__shoes=data.shoes||[];},[data.shoes]);

  function addW(w){
    setData(d=>{
      const oi=getSI(d.totalXP).stage;
      const nx=d.totalXP+w.xp;
      const ni=getSI(nx).stage;
      if(ni>oi){setEvo(STAGES[ni]);setTimeout(()=>setEvo(null),3200)}
      // Add miles to selected shoe, or active shoe if none selected
      let shoes=d.shoes||[];
      if(w.type==="run"&&w.distance){
        const targetId=w.shoeId||(shoes.find(s=>s.active)||{}).id;
        if(targetId){
          // Use exact decimal arithmetic to avoid rounding bugs
          shoes=shoes.map(s=>s.id==targetId?
            {...s,miles:parseFloat(((s.miles||0)+w.distance).toFixed(2))*1}:s);
        }
      }
      return{...d,workouts:[w,...d.workouts],totalXP:nx,shoes};
    });
  }

  useEffect(()=>{
    const h=ev=>{const e=ev.detail;setData(d=>({...d,workouts:[...e,...d.workouts],totalXP:d.totalXP+e.reduce((s,w)=>s+w.xp,0)}))};
    window.addEventListener("batch-import",h);return()=>window.removeEventListener("batch-import",h);
  },[]);

  async function getCoach(){
    if(!data.workouts.length){alert("Log some workouts first!");return}
    setCoaching(true);setCoach({trend:"",motive:""});
    const p=`FitQuest AI Coach. User: ${data.workouts.length} workouts, ${data.totalXP} XP, stage "${si.name}". Recent: ${JSON.stringify(data.workouts.slice(0,20).map(w=>({type:w.type,xp:w.xp,date:w.date,dist:w.distance||null,muscles:w.muscleGroups?Object.keys(w.muscleGroups):null})))}. ONLY respond with JSON no markdown: {"trend":"2-3 sentence analysis with numbers","motive":"1-2 sentence gamified message mentioning '${si.name}'"}`;
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:350,messages:[{role:"user",content:p}]})});
      const d=await r.json();
      const t=d.content?.[0]?.text||"{}";
      setCoach(JSON.parse(t.replace(/```json|```/g,"").trim()));
    }catch{setCoach({trend:"Could not connect to AI coach right now.",motive:"Keep pushing — your power grows every session!"})}
    setCoaching(false);
  }

  function exportD(){
    const b=new Blob([JSON.stringify({...data,exportedAt:new Date().toISOString(),v:"3.0"},null,2)],{type:"application/json"});
    const a=document.createElement("a");a.href=URL.createObjectURL(b);
    a.download=`fitquest-backup-${new Date().toISOString().slice(0,10)}.json`;a.click();
  }

  function importD(file){
    const r=new FileReader();
    r.onload=ev=>{try{const p=JSON.parse(ev.target.result);if(p.workouts&&typeof p.totalXP==="number"){setData({workouts:p.workouts,totalXP:p.totalXP});alert(`✅ Imported ${p.workouts.length} workouts — ${p.totalXP.toLocaleString()} XP restored`)}else alert("❌ Invalid FitQuest backup file")}catch{alert("❌ Could not parse file")}};
    r.readAsText(file);
  }

  function importXML(file){
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const xml=new DOMParser().parseFromString(ev.target.result,"text/xml");
        const byDate={};
        Array.from(xml.querySelectorAll("Record")).filter(r=>r.getAttribute("type")==="HKQuantityTypeIdentifierDistanceWalkingRunning").forEach(rec=>{
          const day=(rec.getAttribute("startDate")||"").slice(0,10);
          const val=parseFloat(rec.getAttribute("value")||0);
          const unit=rec.getAttribute("unit")||"";
          const miles=unit.includes("km")?val*0.621371:val;
          if(!byDate[day])byDate[day]={distance:0,duration:0};
          byDate[day].distance+=miles;
        });
        Array.from(xml.querySelectorAll("Workout")).filter(w=>(w.getAttribute("workoutActivityType")||"").includes("Running")).forEach(w=>{
          const day=(w.getAttribute("startDate")||"").slice(0,10);
          const dur=parseFloat(w.getAttribute("duration")||0);
          if(byDate[day])byDate[day].duration+=dur;
        });
        const entries=Object.entries(byDate).filter(([,v])=>v.distance>.1).map(([date,v])=>({type:"run",xp:Math.round(v.distance*30),date:new Date(date).toLocaleDateString(),distance:Math.round(v.distance*100)/100,duration:Math.round(v.duration)||null,note:"Apple Health",ts:new Date(date).getTime()+Math.random()*999})).sort((a,b)=>b.ts-a.ts);
        if(!entries.length){alert("No running data found. Make sure this is from the Apple Health app export.");return}
        window.dispatchEvent(new CustomEvent("batch-import",{detail:entries}));
        alert(`✅ Imported ${entries.length} runs!\n${entries.reduce((s,e)=>s+e.distance,0).toFixed(1)} total miles`);
      }catch(err){alert("❌ Error parsing file: "+err.message)}
    };
    r.readAsText(file);
  }

  const tabs=[{id:"home",l:"Home"},{id:"log",l:"Log"},{id:"progress",l:"Stats"},{id:"coach",l:"Coach"},{id:"shoes",l:"Shoes"},{id:"data",l:"Data"}];

  return h("div",null,
    evo&&h("div",{className:"evo-overlay",style:{background:evo.c+"ee"}},
      h("div",{style:{fontFamily:"Orbitron,monospace",fontSize:26,fontWeight:900,color:"#fff",textAlign:"center",marginBottom:14,letterSpacing:".04em"}},"⚡ EVOLUTION ⚡"),
      h("img",{src:evo.img,style:{width:170,height:170,objectFit:"contain",imageRendering:"pixelated",filter:"drop-shadow(0 0 24px #fff)"}}),
      h("div",{style:{fontFamily:"Orbitron,monospace",fontSize:20,color:"#fff",marginTop:14,textAlign:"center"}},evo.name),
      h("div",{style:{color:"#ffffffaa",fontSize:14,marginTop:6}},"New form unlocked!")
    ),
    h("nav",{className:"nav"},tabs.map(t=>h("button",{key:t.id,className:"nb"+(tab===t.id?" on":""),onClick:()=>setTab(t.id)},t.l))),
    tab==="home"&&h(Home,{si,data}),
    tab==="log"&&h(Log,{onAdd:addW,onXML:importXML}),
    tab==="progress"&&h(Progress,{data,si}),
    tab==="coach"&&h(Coach,{coach,coaching,onFetch:getCoach,si}),
    tab==="shoes"&&h(Shoes,{data,setData,si}),
    tab==="data"&&h(Data,{data,onExport:exportD,onImport:importD,onReset:()=>{if(confirm("Reset ALL data? Cannot be undone."))setData({workouts:[],totalXP:0})}})
  );
}

function Log({onAdd,onXML}){
  const[type,setType]=useState("run");
  const[dist,setDist]=useState("");
  const[dur,setDur]=useState("");
  const[note,setNote]=useState("");
  const[cxp,setCxp]=useState("");
  const[muscles,setMuscles]=useState({});
  const[addFor,setAddFor]=useState(null);
  const[exIn,setExIn]=useState("");
  const[exWeight,setExWeight]=useState("");
  const[exSets,setExSets]=useState("");
  const[exReps,setExReps]=useState("");
  const todayStr=()=>{const d=new Date();return d.toISOString().slice(0,10);};
  const[workoutDate,setWorkoutDate]=useState(()=>{const d=new Date();return d.toISOString().slice(0,10);});
  const[selectedShoe,setSelectedShoe]=useState("");
  const[runDur,setRunDur]=useState("");
  const[avgPace,setAvgPace]=useState("");
  const[avgHR,setAvgHR]=useState("");
  const[avgCadence,setAvgCadence]=useState("");
  const[temp,setTemp]=useState("");
  const[splits,setSplits]=useState([]);
  const xmlRef=useRef();
  const wt=WTYPES.find(t=>t.id===type);

  function calcXP(){
    if(type==="custom")return parseInt(cxp)||50;
    if(type==="strength"){const t=Object.values(muscles).reduce((s,a)=>s+a.length,0);return Math.min(t*10,100)}
    if(type==="run"||type==="cycling")return Math.round((parseFloat(dist)||0.1)*wt.xp);
    return wt.xp;
  }

  function addEx(mid){
    if(!exIn.trim())return;
    setMuscles(m=>({...m,[mid]:[...(m[mid]||[]),{
      ex:exIn.trim(),
      weight:exWeight?parseFloat(exWeight):null,
      sets:exSets?parseInt(exSets):null,
      reps:exReps?parseInt(exReps):null,
      ts:Date.now()
    }]}));
    setExIn("");setExWeight("");setExSets("");setExReps("");setAddFor(null);
  }

  function submit(){
    const xp=calcXP();
    // Format date nicely from the date picker value (YYYY-MM-DD -> M/D/YYYY)
    const dateParts=workoutDate.split("-");
    const formattedDate=`${parseInt(dateParts[1])}/${parseInt(dateParts[2])}/${dateParts[0]}`;
    const workoutTS=new Date(workoutDate).getTime()||Date.now();
    const runData=type==="run"?{
      duration:runDur||null,
      avgPace:avgPace||null,
      avgHR:avgHR?parseInt(avgHR):null,
      avgCadence:avgCadence?parseInt(avgCadence):null,
      temperature:temp?parseInt(temp):null,
      splits:splits.filter(s=>s.time||s.pace||s.hr),
      shoeId:selectedShoe||null,
    }:{};
    onAdd({type,xp,date:formattedDate,distance:parseFloat(dist)||null,duration:type==="run"?runDur:parseInt(dur)||null,note,...runData,muscleGroups:type==="strength"&&Object.keys(muscles).length?muscles:undefined,ts:workoutTS});
    setDist("");setDur("");setNote("");setCxp("");setMuscles({});
    setRunDur("");setAvgPace("");setAvgHR("");setAvgCadence("");setTemp("");setSplits([]);
    setExIn("");setExWeight("");setExSets("");setExReps("");
    setWorkoutDate(todayStr());setSelectedShoe("");
    alert("✅ +"+xp+" XP earned! Keep grinding!");
  }

  return h("div",{className:"page"},
    h("div",{className:"sec"},"Log Workout"),
    h("div",{className:"card"},
      h("div",{className:"field"},
        h("label",null,"Workout Date"),
        h("input",{type:"date",value:workoutDate,onChange:e=>setWorkoutDate(e.target.value),
          style:{colorScheme:"dark"}})
      ),
      h("div",{className:"field"},
        h("label",null,"Workout Type"),
        h("select",{value:type,onChange:e=>setType(e.target.value)},WTYPES.map(t=>h("option",{key:t.id,value:t.id},t.icon+" "+t.label)))
      ),
      type==="run"&&h("div",null,
        h("div",{className:"field"},h("label",null,"Distance (miles)"),h("input",{type:"number",step:.01,min:0,placeholder:"e.g. 3.10",value:dist,onChange:e=>setDist(e.target.value)})),
        h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}},
          h("div",{className:"field"},h("label",null,"Duration"),h("input",{type:"text",placeholder:"e.g. 28:45",value:runDur,onChange:e=>setRunDur(e.target.value)})),
          h("div",{className:"field"},h("label",null,"Avg Pace (min/mi)"),h("input",{type:"text",placeholder:"e.g. 9:16",value:avgPace,onChange:e=>setAvgPace(e.target.value)}))
        ),
        h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}},
          h("div",{className:"field"},h("label",null,"Avg Heart Rate (bpm)"),h("input",{type:"number",min:0,placeholder:"e.g. 158",value:avgHR,onChange:e=>setAvgHR(e.target.value)})),

function calcVO2Max(runs){
  // VO2Max using ACSM running equation + Swain HR adjustment
  // ACSM: VO2 (ml/kg/min) = 0.2 * speed(m/min) + 3.5
  // Swain: %VO2max = 0.6463 * %HRmax + 0.1407
  const validRuns=runs.filter(r=>{
    if(!r.avgPace||!r.avgHR||!r.distance||r.distance<1)return false;
    const parts=r.avgPace.split(":");
    if(parts.length!==2)return false;
    const paceNum=parseInt(parts[0])+(parseInt(parts[1]||0)/60);
    const hr=parseInt(r.avgHR);
    // Valid pace 7-22 min/mile, HR 100-200
    return paceNum>=7&&paceNum<=22&&hr>=100&&hr<=200;
  });
  if(!validRuns.length)return null;

  const recent=validRuns.slice(0,20);
  const maxHR=190;

  const vo2s=recent.map(r=>{
    const parts=r.avgPace.split(":");
    const paceMinPerMile=parseInt(parts[0])+(parseInt(parts[1]||0)/60);
    // Speed in m/min
    const speedMperMin=1609.34/paceMinPerMile;
    // ACSM running VO2 at this effort
    const vo2atEffort=0.2*speedMperMin+3.5;
    // Swain %VO2max from %HRmax
    const pctHRmax=parseInt(r.avgHR)/maxHR;
    const pctVO2max=Math.min(0.6463*pctHRmax+0.1407,0.98);
    // VO2max = effort VO2 / fraction being used
    return vo2atEffort/Math.max(pctVO2max,0.35);
  });

  // Trim top+bottom 10% outliers
  vo2s.sort((a,b)=>a-b);
  const trimmed=vo2s.slice(
    Math.floor(vo2s.length*0.1),
    Math.ceil(vo2s.length*0.9)||1
  );
  const avg=trimmed.reduce((s,v)=>s+v,0)/trimmed.length;
  return Math.round(Math.min(Math.max(avg,20),80)*10)/10;
}

function getVO2Category(v){
  if(v>=60)return{label:"Elite",color:"#ffff88"};
  if(v>=55)return{label:"Very Good",color:"#22ffdd"};
  if(v>=50)return{label:"Good",color:"#44ee77"};
  if(v>=45)return{label:"Above Average",color:"#88bbff"};
  if(v>=38)return{label:"Average",color:"#ffaa22"};
  if(v>=30)return{label:"Below Average",color:"#ff8844"};
  return{label:"Poor",color:"#ff3f6e"};
}

            const allPaces=paceRuns.map(pr=>{const pp=pr.avgPace.split(":");return parseInt(pp[0])+parseInt(pp[1]||0)/60;});
            const minP=Math.min(...allPaces),maxP=Math.max(...allPaces);
            const range=maxP-minP||1;
            // Faster pace = taller bar (invert)
            const pct=1-(pNum-minP)/range;
            const barH=20+pct*56;
            const isFastest=pNum===minP;
            return h("div",{key:i,style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}},
              h("div",{style:{fontSize:8,color:isFastest?"#44ee77":"var(--muted)",fontFamily:"Orbitron,monospace"}},r.avgPace),
              h("div",{style:{width:"100%",height:barH,background:isFastest?"#44ee77":si.c+"88",borderRadius:"3px 3px 0 0"}})
            )
          })
        ),
        avgPaceNum&&h("div",{style:{fontSize:12,color:"var(--muted)",marginTop:10}},
          "Avg pace: "+Math.floor(avgPaceNum)+":"+(Math.round((avgPaceNum%1)*60)).toString().padStart(2,"0")+"/mi"
        )
      )
    ),
    wa.length>0&&h("div",{className:"card"},
      h("div",{style:{fontSize:10,color:"var(--muted)",letterSpacing:".08em",textTransform:"uppercase",marginBottom:10,fontFamily:"Orbitron,monospace"}},"Weekly XP"),
      h("div",{className:"bar-wrap"},
        wa.map((w,i)=>h("div",{key:i,className:"bc"},
          h("div",{style:{fontSize:9,color:"var(--ac)",fontFamily:"Orbitron,monospace"}},w.xp||""),
          h("div",{className:"bb",style:{height:(w.xp/mx*68)+"px",background:`linear-gradient(180deg,${si.c},${si.c}88)`}}),
          h("div",{style:{fontSize:9,color:"var(--muted)",fontFamily:"Orbitron,monospace"}},w.n+"x")
        ))
      )
    ),
    Object.keys(mm).length>0&&h("div",{className:"card"},
      h("div",{style:{fontSize:10,color:"var(--muted)",letterSpacing:".08em",textTransform:"uppercase",marginBottom:10,fontFamily:"Orbitron,monospace"}},"Muscle Volume"),
      Object.entries(mm).sort((a,b)=>b[1]-a[1]).map(([k,v])=>{
        const mg=MUSCLES.find(m=>m.id===k)||{label:k,icon:"💪"};
        const pct=Math.round(v/Math.max(...Object.values(mm))*100);
        return h("div",{key:k,style:{marginBottom:9}},
          h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:3}},
            h("span",null,mg.icon+" "+mg.label),
            h("span",{style:{color:"var(--ac)",fontFamily:"Orbitron,monospace",fontSize:10}},v+" sets")
          ),
          h("div",{className:"xp-t",style:{height:5}},h("div",{className:"xp-f",style:{width:pct+"%",background:`linear-gradient(90deg,${si.c}88,${si.c})`}}))
        )
      })
    ),
    Object.keys(tm).length>0&&h("div",{className:"card"},
      h("div",{style:{fontSize:10,color:"var(--muted)",letterSpacing:".08em",textTransform:"uppercase",marginBottom:10,fontFamily:"Orbitron,monospace"}},"Workout Breakdown"),
      Object.entries(tm).map(([k,v])=>{
        const wt=WTYPES.find(t=>t.id===k)||{label:k,icon:"⚡"};
        const pct=Math.round(v/data.workouts.length*100);
        return h("div",{key:k,style:{marginBottom:9}},
          h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:3}},
            h("span",null,wt.icon+" "+wt.label),
            h("span",{style:{color:"var(--ac)",fontFamily:"Orbitron,monospace",fontSize:10}},v+" ("+pct+"%)")
          ),
          h("div",{className:"xp-t",style:{height:5}},h("div",{className:"xp-f",style:{width:pct+"%",background:`linear-gradient(90deg,${si.c}88,${si.c})`}}))
        )
      })
    ),
    !data.workouts.length&&h("div",{style:{textAlign:"center",padding:"40px 0",color:"var(--muted)",fontSize:14}},"No workouts yet. Start your journey!")
  );
}

function Coach({coach,coaching,onFetch,si}){
  return h("div",{className:"page"},
    h("div",{style:{textAlign:"center",padding:"14px 0 22px"}},
      h(Char,{si,size:140,orbs:false}),
      h("div",{style:{fontSize:12,color:"var(--muted)",marginTop:10}},si.name+" is ready to coach you")
    ),
    h("button",{className:"btn btn-p",style:{width:"100%",marginBottom:14},onClick:onFetch,disabled:coaching},coaching?"Analyzing…":"Get AI Analysis ⚡"),
    (coach.trend||coaching)&&h("div",{className:"ai-card"},h("div",{className:"al"},"📊 Performance Trend"),h("div",{style:{fontSize:14,lineHeight:1.7,minHeight:40,color:"var(--text)"}},coaching?"Analyzing your data…":coach.trend)),
    (coach.motive||coaching)&&h("div",{className:"ai-card"},h("div",{className:"al"},"⚡ Warrior Message"),h("div",{style:{fontSize:14,lineHeight:1.7,minHeight:32,color:"var(--text)"}},coaching?"Channeling warrior energy…":coach.motive)),
    !coach.trend&&!coaching&&h("div",{style:{textAlign:"center",padding:"28px 0",color:"var(--muted)",fontSize:14}},"Tap Get AI Analysis for personalized coaching.")
  );
}


function Shoes({data,setData,si}){
  const[showAdd,setShowAdd]=useState(false);
  const[showAssign,setShowAssign]=useState(false);
  const[assignShoeId,setAssignShoeId]=useState("");
  const[name,setName]=useState("");
  const[brand,setBrand]=useState("");
  const[maxMiles,setMaxMiles]=useState("400");
  const shoes=data.shoes||[];

  function addShoe(){
    if(!name.trim())return;
    const newShoe={
      id:Date.now(),name:name.trim(),brand:brand.trim(),
      miles:0,maxMiles:parseInt(maxMiles)||400,
      addedDate:new Date().toLocaleDateString(),
      active:shoes.length===0, // first shoe is auto-active
      retired:false
    };
    setData(d=>({...d,shoes:[...(d.shoes||[]),newShoe]}));
    setName("");setBrand("");setMaxMiles("400");setShowAdd(false);
  }

  function setActive(id){
    setData(d=>({...d,shoes:(d.shoes||[]).map(s=>({...s,active:s.id===id}))}));
  }

  function retireShoe(id){
    setData(d=>({...d,shoes:(d.shoes||[]).map(s=>s.id===id?{...s,active:false,retired:true}:s)}));
  }

  function deleteShoe(id){
    if(!confirm("Delete this shoe?"))return;
    setData(d=>({...d,shoes:(d.shoes||[]).filter(s=>s.id!==id)}));
  }

  function resetMiles(id){
    if(!confirm("Reset miles to 0?"))return;
    setData(d=>({...d,shoes:(d.shoes||[]).map(s=>s.id===id?{...s,miles:0}:s)}));
  }

  const activeShoe=shoes.find(s=>s.active);

  return h("div",{className:"page"},
    h("div",{className:"sec"},"Shoe Tracker"),

    // Active shoe hero
    activeShoe&&h("div",{className:"card",style:{marginBottom:14,border:"1px solid "+si.c+"50",background:si.c+"08"}},
      h("div",{style:{display:"flex",alignItems:"center",gap:12,marginBottom:14}},
        h("div",{style:{fontSize:36}},"👟"),
        h("div",{style:{flex:1}},
          h("div",{style:{fontFamily:"Orbitron,monospace",fontSize:14,color:si.c}},activeShoe.name),
          h("div",{style:{fontSize:12,color:"var(--muted)",marginTop:2}},activeShoe.brand||"No brand"+" · Added "+activeShoe.addedDate),
          h("div",{style:{fontSize:11,color:"var(--muted)",marginTop:1}},"Active shoe")
        )
      ),
      // Miles bar
      h("div",null,
        h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:5}},
          h("span",{style:{color:"var(--muted)"}},"Miles logged"),
          h("span",{style:{fontFamily:"Orbitron,monospace",fontSize:11,
            color:activeShoe.miles>=activeShoe.maxMiles?"#ff3f6e":activeShoe.miles>=activeShoe.maxMiles*.8?"#ffaa22":si.c}},
            activeShoe.miles.toFixed(1)+" / "+activeShoe.maxMiles+" mi")
        ),
        h("div",{className:"xp-t"},
          h("div",{className:"xp-f",style:{
            width:Math.min(activeShoe.miles/activeShoe.maxMiles*100,100)+"%",
            background:activeShoe.miles>=activeShoe.maxMiles?"linear-gradient(90deg,#ff3f6e88,#ff3f6e)":
              activeShoe.miles>=activeShoe.maxMiles*.8?"linear-gradient(90deg,#ffaa2288,#ffaa22)":
              `linear-gradient(90deg,${si.c}88,${si.c})`
          }})
        ),
        activeShoe.miles>=activeShoe.maxMiles&&h("div",{style:{marginTop:8,background:"#ff3f6e18",border:"1px solid #ff3f6e40",borderRadius:8,padding:"8px 12px",fontSize:12,color:"#ff3f6e",textAlign:"center"}},
          "⚠️ Time for new shoes! You've exceeded "+activeShoe.maxMiles+" miles."
        ),
        activeShoe.miles>=activeShoe.maxMiles*.8&&activeShoe.miles<activeShoe.maxMiles&&h("div",{style:{marginTop:8,background:"#ffaa2218",border:"1px solid #ffaa2240",borderRadius:8,padding:"8px 12px",fontSize:12,color:"#ffaa22",textAlign:"center"}},
          "⚡ Getting close — start thinking about new shoes soon."
        )
      )
    ),

    // Add shoe button
    h("button",{className:"btn btn-p",style:{width:"100%",marginBottom:10},onClick:()=>setShowAdd(!showAdd)},
      showAdd?"Cancel":"+ Add New Shoe"
    ),
    // Assign past runs button
    shoes.length>0&&h("button",{className:"btn btn-s",style:{width:"100%",marginBottom:14},onClick:()=>setShowAssign(!showAssign)},
      showAssign?"Cancel":"📋 Assign Past Runs to a Shoe"
    ),

    // Add shoe form
    showAdd&&h("div",{className:"card",style:{marginBottom:14}},
      h("div",{style:{fontFamily:"Orbitron,monospace",fontSize:11,color:si.c,marginBottom:12,letterSpacing:".08em"}},"NEW SHOE"),
      h("div",{className:"field"},h("label",null,"Shoe Name / Model"),
        h("input",{type:"text",placeholder:"e.g. Nike Pegasus 41",value:name,onChange:e=>setName(e.target.value)})
      ),
      h("div",{className:"field"},h("label",null,"Brand (optional)"),
        h("input",{type:"text",placeholder:"e.g. Nike",value:brand,onChange:e=>setBrand(e.target.value)})
      ),
      h("div",{className:"field"},h("label",null,"Replace at (miles)"),
        h("input",{type:"number",min:100,max:1000,placeholder:"400",value:maxMiles,onChange:e=>setMaxMiles(e.target.value)}),
        h("div",{style:{fontSize:11,color:"var(--muted)",marginTop:4}},"Most shoes last 300-500 miles. Default is 400.")
      ),
      h("button",{className:"btn btn-p",onClick:addShoe},"Add Shoe 👟")
    ),

    // Assign past runs UI
    showAssign&&shoes.length>0&&h("div",{className:"card",style:{marginBottom:14}},
      h("div",{style:{fontFamily:"Orbitron,monospace",fontSize:11,color:"var(--ac)",marginBottom:12,letterSpacing:".08em"}},"ASSIGN PAST RUNS"),
      h("div",{className:"field"},
        h("label",null,"Select Shoe"),
        h("select",{value:assignShoeId,onChange:e=>setAssignShoeId(e.target.value)},
          h("option",{value:""},"— Pick a shoe —"),
          shoes.filter(s=>!s.retired).map(s=>h("option",{key:s.id,value:s.id},s.name+(s.brand?" ("+s.brand+")":"")))
        )
      ),
      assignShoeId&&h("div",null,
        h("div",{style:{fontSize:12,color:"var(--muted)",marginBottom:10,lineHeight:1.6}},
          "Tap a run to assign it to this shoe. Tap again to remove."
        ),
        // Close button
        h("button",{
          onClick:()=>{setAssignShoeId("");setShowAssign(false);},
          style:{width:"100%",background:"#ffffff0a",border:"1px solid #ffffff14",
            borderRadius:8,padding:"8px",color:"#aab",fontFamily:"Orbitron,monospace",
            fontSize:10,cursor:"pointer",letterSpacing:".06em",marginBottom:10}
        },"✕ Done Assigning"),
        h("div",{style:{maxHeight:380,overflowY:"auto",borderRadius:8,border:"1px solid var(--border)"}},
          (data.workouts||[]).filter(w=>w.type==="run"&&w.distance).map((w,i)=>{
            const assigned=w.shoeId==assignShoeId;
            const otherShoe=w.shoeId&&w.shoeId!=assignShoeId?shoes.find(s=>s.id==w.shoeId):null;
            return h("div",{key:i,
              onClick:()=>{
                // Toggle assignment on tap — fix: use exact distance value
                setData(d=>{
                  const runIdx=d.workouts.findIndex((_,wi)=>wi===i);
                  const run=d.workouts[runIdx];
                  const runDist=parseFloat(run.distance)||0;
                  let updatedShoes=[...(d.shoes||[])];
                  const isNowAssigned=run.shoeId==assignShoeId;
                  // Remove from old shoe if reassigning
                  if(run.shoeId&&run.shoeId!=assignShoeId){
                    updatedShoes=updatedShoes.map(s=>s.id==run.shoeId?
                      {...s,miles:Math.max(0,parseFloat((s.miles||0)-runDist).toFixed(2)*1)}:s);
                  }
                  if(isNowAssigned){
                    // Unassign — remove miles
                    updatedShoes=updatedShoes.map(s=>s.id==assignShoeId?
                      {...s,miles:Math.max(0,parseFloat(((s.miles||0)-runDist).toFixed(2))*1)}:s);
                  } else {
                    // Assign — add exact miles
                    updatedShoes=updatedShoes.map(s=>s.id==assignShoeId?
                      {...s,miles:parseFloat(((s.miles||0)+runDist).toFixed(2))*1}:s);
                  }
                  const updatedWorkouts=d.workouts.map((wk,wi)=>wi===i?
                    {...wk,shoeId:isNowAssigned?null:assignShoeId}:wk);
                  return{...d,shoes:updatedShoes,workouts:updatedWorkouts};
                });
              },
              style:{
                display:"flex",alignItems:"center",gap:12,padding:"12px 14px",
                borderBottom:"1px solid #ffffff08",cursor:"pointer",
                background:assigned?`var(--ac)12`:"transparent",
                transition:"background .15s"
              }},
              // Big tap-friendly check indicator
              h("div",{style:{
                width:22,height:22,borderRadius:6,flexShrink:0,
                background:assigned?"var(--ac)":"#ffffff10",
                border:"1px solid "+(assigned?"var(--ac)":"#ffffff20"),
                display:"flex",alignItems:"center",justifyContent:"center",
                fontSize:13,color:"#fff",fontWeight:700
              }},assigned?"✓":""),
              h("div",{style:{flex:1,minWidth:0}},
                h("div",{style:{fontSize:13,fontWeight:600,color:assigned?"var(--ac)":"var(--text)"}},
                  w.date+" · "+w.distance+" mi"),
                h("div",{style:{fontSize:11,color:otherShoe?"#ffaa30":"var(--muted)",marginTop:2}},
                  otherShoe?"⚠️ Currently on: "+otherShoe.name:
                  w.duration?w.duration+(w.avgPace?" · "+w.avgPace+"/mi":""):"No details")
              ),
              h("div",{style:{fontSize:11,color:assigned?"var(--ac)":"var(--muted)",flexShrink:0,fontFamily:"Orbitron,monospace"}},
                w.distance+" mi")
            )
          })
        )
      )
    ),

    // All shoes list
    shoes.length>0&&h("div",null,
      h("div",{className:"sec"},"All Shoes"),
      shoes.map(shoe=>h("div",{key:shoe.id,className:"card",style:{
        marginBottom:10,opacity:shoe.retired?.6:1,
        border:shoe.active?"1px solid "+si.c+"50":"1px solid var(--border)"
      }},
        h("div",{style:{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:10}},
          h("div",null,
            h("div",{style:{fontSize:14,fontWeight:600,color:shoe.retired?"var(--muted)":"var(--text)"}},
              (shoe.active?"✅ ":"")+(shoe.retired?"🗑 ":"")+shoe.name
            ),
            h("div",{style:{fontSize:11,color:"var(--muted)",marginTop:2}},
              (shoe.brand||"")+(shoe.brand?" · ":"")+shoe.addedDate
            )
          ),
          h("div",{style:{fontFamily:"Orbitron,monospace",fontSize:12,color:
            shoe.miles>=shoe.maxMiles?"#ff3f6e":shoe.miles>=shoe.maxMiles*.8?"#ffaa22":si.c}},
            shoe.miles.toFixed(1)+"mi"
          )
        ),
        // Miles bar
        h("div",{className:"xp-t",style:{marginBottom:10}},
          h("div",{className:"xp-f",style:{
            width:Math.min(shoe.miles/shoe.maxMiles*100,100)+"%",
            background:shoe.miles>=shoe.maxMiles?"linear-gradient(90deg,#ff3f6e88,#ff3f6e)":
              shoe.miles>=shoe.maxMiles*.8?"linear-gradient(90deg,#ffaa2288,#ffaa22)":
              `linear-gradient(90deg,${si.c}88,${si.c})`
          }})
        ),
        // Action buttons
        h("div",{style:{display:"flex",gap:7,flexWrap:"wrap"}},
          !shoe.active&&!shoe.retired&&h("button",{className:"btn btn-p",style:{padding:"5px 12px",fontSize:10},onClick:()=>setActive(shoe.id)},"Set Active"),
          !shoe.retired&&h("button",{className:"btn btn-s",style:{padding:"5px 12px",fontSize:10},onClick:()=>retireShoe(shoe.id)},"Retire"),
          h("button",{className:"btn btn-s",style:{padding:"5px 12px",fontSize:10},onClick:()=>resetMiles(shoe.id)},"Reset Miles"),
          h("button",{className:"btn btn-d",style:{padding:"5px 12px",fontSize:10},onClick:()=>deleteShoe(shoe.id)},"Delete")
        )
      ))
    ),

    shoes.length===0&&!showAdd&&h("div",{style:{textAlign:"center",padding:"28px 0",color:"var(--muted)",fontSize:14}},
      h("div",{style:{fontSize:36,marginBottom:10}},"👟"),
      "Add your first shoe to start tracking mileage"
    )
  );
}

function Data({data,onExport,onImport,onReset}){
  const[drag,setDrag]=useState(false);
  const ref=useRef();
  const si=getSI(data.totalXP);
  const kb=(JSON.stringify(data).length/1024).toFixed(1);
  return h("div",{className:"page"},
    h("div",{className:"sec"},"Save & Backup"),
    h("div",{className:"card"},
      h("div",{style:{display:"flex",flexWrap:"wrap",gap:8,marginBottom:14}},
        h("span",{style:{background:"#70ff9014",color:"#70ff90",border:"1px solid #70ff9030",padding:"2px 9px",borderRadius:99,fontSize:11}},data.workouts.length+" workouts"),
        h("span",{style:{background:"var(--ac)14",color:"var(--ac)",border:"1px solid var(--ac)30",padding:"2px 9px",borderRadius:99,fontSize:11}},data.totalXP.toLocaleString()+" XP"),
        h("span",{style:{background:"#ffaa3014",color:"#ffaa30",border:"1px solid #ffaa3030",padding:"2px 9px",borderRadius:99,fontSize:11}},kb+" KB"),
        h("span",{style:{background:"#c060ff14",color:"#c060ff",border:"1px solid #c060ff30",padding:"2px 9px",borderRadius:99,fontSize:11}},"Stage "+(si.stage+1))
      ),
      h("div",{style:{display:"flex",gap:9,flexWrap:"wrap"}},
        h("button",{className:"btn btn-p",onClick:onExport},"💾 Export Backup"),
        h("button",{className:"btn btn-d",onClick:onReset},"🗑 Reset All")
      )
    ),
    h("div",{className:"sec"},"Import Backup"),
    h("div",{className:"card"},
      h("div",{className:"drop-z"+(drag?" over":""),onClick:()=>ref.current.click(),
        onDragOver:e=>{e.preventDefault();setDrag(true)},onDragLeave:()=>setDrag(false),
        onDrop:e=>{e.preventDefault();setDrag(false);const f=e.dataTransfer.files[0];if(f)onImport(f)}},
        "📂 Drop fitquest-backup.json here or tap to browse"
      ),
      h("input",{type:"file",accept:".json",ref,style:{display:"none"},onChange:e=>{const f=e.target.files[0];if(f)onImport(f);e.target.value=""}}),
      h("div",{style:{fontSize:11,color:"var(--muted)",lineHeight:1.7,marginTop:9}},"⚠️ Import overwrites current save. Export a backup first.")
    ),
    h("div",{className:"sec"},"XP Guide"),
    h("div",{className:"card"},
      h("div",{style:{fontSize:12,color:"var(--muted)",lineHeight:2.1}},
        "🏃 Run = 25 XP/mile  ·  💪 Strength = 10 XP/exercise (max 100)",h("br"),
        "🚴 Cycling = 15 XP/mile  ·  🏊 Swim = 40 XP/session  ·  ⚡ Custom = your call",h("br"),
        h("br"),
        "🥋 Stage XP Requirements:",h("br"),
        "1→2 Rookie→Contender: 5,000 XP (~3-4 months)",h("br"),
        "2→3 Contender→Brawler: 10,000 XP (~6-8 months)",h("br"),
        "3→4 Brawler→Warrior: 20,000 XP (~1-1.5 years)",h("br"),
        "4→5 Warrior→Shadow Samurai: 40,000 XP (~2-3 years)",h("br"),
        "5→6 Shadow Samurai→Legend: 75,000 XP (~4-6 years)",h("br"),
        "6→7 Legend→Eternal: 150,000 XP (~8-12 years)"
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
